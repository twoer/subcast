# SPDX-License-Identifier: Apache-2.0
name: Feature request
description: Suggest a new capability or an improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that Subcast doesn't let you do today?
    validations:
      required: true

  - type: textarea
    id: current-workaround
    attributes:
      label: Current workaround
      description: How do you get by without this today? (even "I can't" is useful.)
    validations:
      required: false

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you expect to see? Sketches, mockups, or example flows welcome.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      multiple: true
      options:
        - Transcription (Whisper)
        - Translation / AI summary (Ollama)
        - Player / waveform / shortcuts
        - Setup wizard / model management
        - Export (SRT/VTT/TXT, bilingual)
        - Desktop packaging / installer
        - i18n / locales
        - Other
    validations:
      required: false
