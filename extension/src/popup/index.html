<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 12px;
      margin: 0;
      font-size: 13px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #999;
    }
    .dot.connected { background: #4caf50; }
    .dot.disconnected { background: #f44336; }
    .dot.connecting { background: #ff9800; }
    .title {
      font-weight: 600;
      font-size: 14px;
    }
    .subtitle {
      color: #666;
      font-size: 11px;
    }
    .btn {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .btn-start {
      background: #1a73e8;
      color: white;
    }
    .btn-stop {
      background: #ea4335;
      color: white;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .settings-link {
      display: block;
      text-align: center;
      color: #1a73e8;
      text-decoration: none;
      font-size: 12px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="status">
    <span class="dot disconnected" id="dot"></span>
    <div>
      <div class="title">Subcast Live</div>
      <div class="subtitle" id="status-text">Disconnected</div>
    </div>
  </div>
  <button class="btn btn-start" id="start-btn">Start Subtitles</button>
  <button class="btn btn-stop" id="stop-btn" disabled>Stop</button>
  <a class="settings-link" href="http://localhost:3000/settings" target="_blank">Open Settings</a>
  <script src="index.ts" type="module"></script>
</body>
</html>
